---
- name: Server Resource Inspection
  hosts: all
  gather_facts: yes
  
  tasks:
    - name: Get system load average
      shell: "cat /proc/loadavg | awk '{print $1, $2, $3}'"
      register: load_result
      changed_when: false
    
    - name: Get memory details
      shell: |
        free -m | awk '/Mem:/ {
          total=$2;
          used=$3;
          free=$4;
          available=$7;
          printf "total=%d used=%d free=%d available=%d", total, used, free, available
        }'
      register: mem_result
      changed_when: false
    
    - name: Show System Info
      debug:
        msg: >
          Host: {{ inventory_hostname }} |
          OS: {{ ansible_distribution }} {{ ansible_distribution_version }} |
          Kernel: {{ ansible_kernel }} |
          Uptime: {{ ansible_uptime_seconds | int // 86400 }} days
    
    - name: Check CPU Load
      debug:
        msg: >
          CPU Cores: {{ ansible_processor_vcpus }} |
          Load Average (1m/5m/15m): {{ load_result.stdout }}
    
    - name: Check Memory Usage
      debug:
        msg: >
          Total Memory: {{ (mem_result.stdout.split('=')[1].split(' ')[0] | int / 1024) | round(1) }} GB |
          Used Memory: {{ (mem_result.stdout.split('=')[2].split(' ')[0] | int / 1024) | round(1) }} GB |
          Available: {{ (mem_result.stdout.split('=')[3] | int / 1024) | round(1) }} GB
    
    - name: Check Disk Space (Root)
      debug:
        msg: >
          Device: {{ ansible_mounts[0]['device'] }} |
          Total: {{ (ansible_mounts[0]['size_total'] / 1024 / 1024 / 1024) | round(1) }} GB |
          Used: {{ (ansible_mounts[0]['size_used'] / 1024 / 1024 / 1024) | round(1) }} GB |
          Available: {{ (ansible_mounts[0]['size_available'] / 1024 / 1024 / 1024) | round(1) }} GB
      when: ansible_mounts is defined and ansible_mounts | length > 0
    
    - name: Show IP Address
      debug:
        msg: "IP Address: {{ ansible_default_ipv4['address'] }}"
      when: ansible_default_ipv4 is defined
